<section id="contact" class="text-overlay">
    <div class="content-wrapper">
        <div class="hero">
            <h2 class="lang lang-en">Contact Us</h2>
            <h2 class="lang lang-he" dir="rtl" style="display:none;">צור קשר</h2>
            <p class="lang lang-en">Ready to streamline your workflow? Contact us for a free consultation today.</p>
            <p class="lang lang-he" dir="rtl" style="display:none;">מוכן לשדרג את תהליך העבודה שלך? צור קשר לייעוץ חינם היום.</p>
            <form id="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
                <label class="lang lang-en" for="name">Name:</label>
                <label class="lang lang-he" for="name" dir="rtl" style="display:none;">שם:</label>
                <input type="text" name="name" required>

                <label class="lang lang-en" for="company">Company:</label>
                <label class="lang lang-he" for="company" dir="rtl" style="display:none;">חברה:</label>
                <input type="text" name="company">

                <label class="lang lang-en" for="email">Email:</label>
                <label class="lang lang-he" for="email" dir="rtl" style="display:none;">אימייל:</label>
                <input type="email" name="_replyto" required>

                <label class="lang lang-en" for="message">Message:</label>
                <label class="lang lang-he" for="message" dir="rtl" style="display:none;">הודעה:</label>
                <textarea name="message" required></textarea>
                <input type="text" name="_gotcha" style="display:none">

                <button type="submit">
                    <span class="lang lang-en">Send Message</span>
                    <span class="lang lang-he" dir="rtl" style="display:none;">שלח הודעה</span>
                </button>
            </form>
        </div>
    </div>
</section>
