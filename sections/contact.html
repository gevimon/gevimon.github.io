<section id="contact" class="text-overlay">
    <div class="content-wrapper">
        <div class="hero">
            <h2 class="lang lang-en"  style="display:none;">Contact Us</h2>
            <h2 class="lang lang-he" dir="rtl" >צור קשר</h2>
            <p class="lang lang-en"  style="display:none;">
                Want to get your business buzzing? Let’s see how we can help.<br>  
                Contact us today!
            </p>
            
            <p class="lang lang-he" dir="rtl" >
                בכוורת שלנו יש מקום גם לך – בוא נראה איך אפשר לעזור.<br>
                צרו קשר לייעוץ חינם היום!
                </p>                
            <form id="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
                <label class="lang lang-en"  style="display:none;" for="name">Name:</label>
                <label class="lang lang-he" for="name" dir="rtl" >שם:</label>
                <input type="text" name="name" required>

                <label class="lang lang-en"  style="display:none;" for="company">Company:</label>
                <label class="lang lang-he" for="company" dir="rtl" >חברה:</label>
                <input type="text" name="company">

                <label class="lang lang-en"  style="display:none;" for="email">Email:</label>
                <label class="lang lang-he" for="email" dir="rtl" >אימייל:</label>
                <input type="email" name="_replyto" required>

                <label class="lang lang-en"  style="display:none;" for="message">Message:</label>
                <label class="lang lang-he" for="message" dir="rtl" >הודעה:</label>
                <textarea name="message" required></textarea>
                <input type="text" name="_gotcha" style="display:none">

                <button type="submit">
                    <span class="lang lang-en"  style="display:none;">Send Message</span>
                    <span class="lang lang-he" dir="rtl" >שלח הודעה</span>
                </button>
            </form>
        </div>
    </div>
